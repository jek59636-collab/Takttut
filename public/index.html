<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🏎️ Country Race Live</title>
<script src="/socket.io/socket.io.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#07071a;--panel:#0f0f28;--red:#ff2d55;--gold:#ffd700;--dim:rgba(255,255,255,0.35)}
body{background:var(--bg);font-family:'Exo 2',sans-serif;color:#fff;min-height:100vh;overflow-x:hidden}

/* SETUP */
#setup{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:28px;z-index:99}
.logo{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;letter-spacing:3px}
.logo span{color:var(--red)}
.card{background:var(--panel);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:26px 22px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px}
.lbl{font-size:11px;color:var(--dim);letter-spacing:2px;font-weight:700}
.inp{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 15px;color:#fff;font-size:16px;font-weight:700;width:100%;outline:none;font-family:'Exo 2',sans-serif;transition:border .2s}
.inp:focus{border-color:var(--red)}
.inp::placeholder{color:var(--dim)}
.cbtn{background:var(--red);color:#fff;border:none;border-radius:13px;padding:15px;font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:2px;cursor:pointer}
.cbtn:disabled{opacity:.4}
#sstat{font-size:12px;text-align:center;color:var(--dim);min-height:18px}
#sstat.err{color:#ff6b6b}
#sstat.ok{color:#2ecc71}
#sstat.load{color:var(--gold)}

/* GAME */
#game{display:none}
.hdr{background:var(--panel);border-bottom:1px solid rgba(255,255,255,0.06);padding:9px 13px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.htitle{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:2px}
.htitle span{color:var(--red)}
.hright{display:flex;align-items:center;gap:8px}
.ldot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:bl 1.2s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.llbl{font-family:'Orbitron',monospace;font-size:10px;color:var(--red);letter-spacing:2px}
.dcbtn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:var(--dim);font-size:10px;padding:5px 9px;cursor:pointer;font-family:'Exo 2',sans-serif}
.ubar{background:rgba(255,45,85,0.07);border-bottom:1px solid rgba(255,45,85,0.12);padding:6px 13px;font-size:11px;color:rgba(255,255,255,0.5);text-align:center}
.ubar b{color:var(--red)}

/* WINS BAR */
.wbar{display:flex;gap:5px;padding:7px 11px;overflow-x:auto;scrollbar-width:none;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,0.05)}
.wbar::-webkit-scrollbar{display:none}
.wchip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:4px 9px;white-space:nowrap;flex-shrink:0;transition:all .3s}
.wchip.lead{border-color:var(--gold);background:rgba(255,215,0,0.08)}
.wchip .wf{font-size:13px}.wchip .wn{font-size:9px;color:var(--dim);font-weight:700}.wchip .wc{font-family:'Orbitron',monospace;color:var(--gold);font-size:10px;font-weight:900}

/* TRACKS */
.tracks{padding:9px 9px 3px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:6px;position:relative}
.rnum{font-family:'Orbitron',monospace;font-size:9px;color:var(--dim);width:14px;text-align:center;flex-shrink:0}
.rnum.r1{color:var(--gold)}.rnum.r2{color:#c0c0c0}.rnum.r3{color:#cd7f32}
.fcell{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.trk{flex:1;height:34px;background:rgba(255,255,255,0.03);border-radius:17px;border:1px solid rgba(255,255,255,0.06);position:relative;overflow:visible}
.trk::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:repeating-linear-gradient(90deg,rgba(255,255,255,0.08) 0,rgba(255,255,255,0.08) 7px,transparent 7px,transparent 16px);transform:translateY(-50%);border-radius:17px;overflow:hidden}

/* finish line inside track - clip it */
.trk-inner{position:absolute;inset:0;border-radius:17px;overflow:hidden}
.trl{position:absolute;top:50%;transform:translateY(-50%);height:2px;border-radius:2px;left:2px;width:0;transition:width .35s cubic-bezier(.25,.46,.45,.94);opacity:.45}
.tfin{position:absolute;right:0;top:0;bottom:0;width:11px;background:repeating-linear-gradient(180deg,#fff 0,#fff 3px,#000 3px,#000 6px);opacity:.55;z-index:3}

/* CAR */
.tcar{position:absolute;top:50%;transform:translateY(-50%);font-size:18px;left:2px;transition:left .35s cubic-bezier(.25,.46,.45,.94);z-index:10;line-height:1;filter:drop-shadow(0 0 5px rgba(255,255,255,.3))}
.tcar.jump{animation:carjump .4s ease}
@keyframes carjump{0%{transform:translateY(-50%)}40%{transform:translateY(-80%)}100%{transform:translateY(-50%)}}

/* GIFT BUBBLE on car */
.gift-bubble{position:absolute;top:-28px;transform:translateX(-50%);background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:2px 6px;font-size:11px;white-space:nowrap;z-index:20;animation:bubbleUp .9s ease forwards;pointer-events:none;display:flex;align-items:center;gap:3px}
@keyframes bubbleUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}
.bubble-icon{font-size:14px}
.bubble-text{font-size:9px;color:#fff;font-weight:700}
.bubble-pts{font-family:'Orbitron',monospace;font-size:9px;color:var(--gold);font-weight:900}

.pbox{width:34px;text-align:center;flex-shrink:0}
.pval{font-family:'Orbitron',monospace;font-size:11px;font-weight:900}
.plbl{font-size:7px;color:var(--dim);letter-spacing:1px}

/* GIFT FEED */
.feedwrap{margin:7px 9px;background:var(--panel);border:1px solid rgba(255,255,255,0.06);border-radius:13px;overflow:hidden}
.feedtitle{padding:7px 11px;font-size:9px;color:var(--dim);letter-spacing:2px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,.2)}
.feed{max-height:100px;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:4px;scrollbar-width:none}
.feed::-webkit-scrollbar{display:none}
.fitem{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.03);border-radius:7px;padding:5px 9px;animation:si .3s ease;border:1px solid rgba(255,255,255,0.05)}
@keyframes si{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.ffl{font-size:15px}.fgift-icon{font-size:15px}.finfo{flex:1;min-width:0}
.fv{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fg{font-size:9px;color:var(--dim)}
.fpts{font-family:'Orbitron',monospace;font-size:10px;color:var(--gold);font-weight:900;white-space:nowrap}

.resetwrap{padding:7px 9px 13px}
.resetbtn{width:100%;padding:11px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:11px;color:var(--dim);font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px}

/* WINNER */
#wov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;flex-direction:column;gap:17px;z-index:999}
#wov.show{display:flex;animation:fi .3s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.wcard{background:linear-gradient(135deg,#12122a,#1a1a3e);border:2px solid var(--gold);border-radius:22px;padding:30px 38px;text-align:center;box-shadow:0 0 45px rgba(255,215,0,.2)}
.wflag{font-size:60px;margin-bottom:8px}
.wname{font-family:'Orbitron',monospace;color:var(--gold);font-size:22px;font-weight:900;letter-spacing:2px}
.wsub{color:var(--dim);font-size:13px;margin-top:7px}
.nbtn{background:var(--red);color:#fff;border:none;border-radius:13px;padding:13px 30px;font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:2px;cursor:pointer}

.cp{position:fixed;width:7px;height:7px;border-radius:2px;animation:cf 2s linear forwards;z-index:1000;pointer-events:none}
@keyframes cf{0%{transform:translateY(-15px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">COUNTRY <span>RACE</span> 🏎️</div>
  <div class="card">
    <div class="lbl">TIKTOK USERNAME</div>
    <input class="inp" id="uinp" type="text" placeholder="@yourusername" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="cbtn" id="cbtn" onclick="doConnect()">🔴 CONNECT TO LIVE</button>
    <div id="sstat">Enter your TikTok username</div>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div class="hdr">
    <div class="htitle">COUNTRY <span>RACE</span></div>
    <div class="hright"><div class="ldot"></div><div class="llbl">LIVE</div><button class="dcbtn" onclick="doDisconnect()">✕ DC</button></div>
  </div>
  <div class="ubar">Connected: <b id="cusr">@user</b></div>
  <div class="wbar" id="wbar"></div>
  <div class="tracks" id="tracks"></div>
  <div class="feedwrap">
    <div class="feedtitle">🎁 LIVE GIFTS</div>
    <div class="feed" id="feed"><div style="text-align:center;color:rgba(255,255,255,.18);font-size:11px;padding:18px 0">Waiting for gifts...</div></div>
  </div>
  <div class="resetwrap"><button class="resetbtn" onclick="resetRace(false)">🔄 NEW RACE</button></div>
</div>

<!-- WINNER -->
<div id="wov">
  <div class="wcard"><div class="wflag" id="wfl">🏆</div><div class="wname" id="wnm">WINNER!</div><div class="wsub" id="wsb"></div></div>
  <button class="nbtn" onclick="nextRace()">▶ NEXT RACE</button>
</div>

<script>
const C=[
  {name:'Saudi',  flag:'🇸🇦',car:'🏎️',col:'#2ecc40'},
  {name:'Egypt',  flag:'🇪🇬',car:'🚗',col:'#ff4136'},
  {name:'Pakistan',flag:'🇵🇰',car:'🚙',col:'#01d68f'},
  {name:'UAE',    flag:'🇦🇪',car:'🏁',col:'#ff851b'},
  {name:'Kuwait', flag:'🇰🇼',car:'🚕',col:'#ffdc00'},
  {name:'Qatar',  flag:'🇶🇦',car:'🏎️',col:'#b10dc9'},
  {name:'Bahrain',flag:'🇧🇭',car:'🚗',col:'#ff69b4'},
  {name:'Oman',   flag:'🇴🇲',car:'🚙',col:'#7fdbff'},
  {name:'Algeria',flag:'🇩🇿',car:'🚕',col:'#3d9970'},
  {name:'Morocco',flag:'🇲🇦',car:'🏎️',col:'#ff6b6b'},
];

// Gift name → emoji icon mapping
const GIFT_ICONS = {
  'Rose':'🌹','TikTok':'🎵','Finger Heart':'🤞','Sunglasses':'🕶️',
  'Ice Cream':'🍦','Perfume':'💐','Hand Heart':'🫶','Mic':'🎤',
  'Concert':'🎸','Drama Queen':'👑','Lion':'🦁','Universe':'🌌',
  'GG':'🎮','Panda':'🐼','Football':'⚽','Star':'⭐','Gift':'🎁',
  'Heart':'❤️','Like':'👍','Crown':'👑','Diamond':'💎','Fire':'🔥',
  'Rocket':'🚀','Rainbow':'🌈','Cake':'🎂','Money':'💰',
};

function getGiftIcon(name){return GIFT_ICONS[name]||'🎁';}

const MAX=100;
let sc=Array(10).fill(0),ws=Array(10).fill(0),over=false;
const sock=io();

sock.on('status',d=>{d.connected?showGame(d.username):showSetup(d.error||'')});

sock.on('gift',d=>{
  if(over)return;
  addPts(d.country,d.points,d.giftName,d.repeat);
  addFeed(d);
});

sock.on('like',d=>{if(over)return;addPts(d.country,d.points,'Like',1);});
sock.on('comment_boost',d=>{if(over)return;addPts(d.country,d.points,'',1);});

async function doConnect(){
  const u=document.getElementById('uinp').value.trim();
  if(!u)return stat('Please enter username','err');
  stat('Connecting...','load');
  document.getElementById('cbtn').disabled=true;
  try{
    const r=await fetch('/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u})});
    const d=await r.json();
    if(!d.success){stat(d.error||'Failed','err');document.getElementById('cbtn').disabled=false;}
  }catch(e){stat('Server error','err');document.getElementById('cbtn').disabled=false;}
}

function doDisconnect(){fetch('/disconnect',{method:'POST'});showSetup('');}
function stat(m,t=''){const e=document.getElementById('sstat');e.textContent=m;e.className=t;}

function showGame(u){
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('cusr').textContent='@'+u;
  buildUI();
}
function showSetup(err){
  document.getElementById('setup').style.display='flex';
  document.getElementById('game').style.display='none';
  document.getElementById('cbtn').disabled=false;
  stat(err?err:'Enter your TikTok username',err?'err':'');
}

function buildUI(){
  document.getElementById('wbar').innerHTML=C.map((c,i)=>`
    <div class="wchip" id="wc${i}">
      <span class="wf">${c.flag}</span>
      <span class="wn">${c.name}</span>
      <span class="wc" id="wn${i}">${ws[i]}W</span>
    </div>`).join('');

  document.getElementById('tracks').innerHTML=C.map((c,i)=>`
    <div class="row">
      <div class="rnum" id="rn${i}">${i+1}</div>
      <div class="fcell">${c.flag}</div>
      <div class="trk" id="tr${i}">
        <div class="trk-inner">
          <div class="trl" id="tl${i}" style="background:${c.col}"></div>
          <div class="tfin"></div>
        </div>
        <div class="tcar" id="tc${i}">${c.car}</div>
      </div>
      <div class="pbox">
        <div class="pval" id="pv${i}">0</div>
        <div class="plbl">PTS</div>
      </div>
    </div>`).join('');
  over=false;
}

function addPts(i,p,giftName,repeat){
  sc[i]=Math.min(sc[i]+p,MAX);
  updateTrack(i);
  // Show gift bubble on car
  if(giftName) showGiftBubble(i,giftName,p,repeat);
  // Jump car
  jumpCar(i);
  if(sc[i]>=MAX)finish(i);
}

function jumpCar(i){
  const car=document.getElementById('tc'+i);
  if(!car)return;
  car.classList.remove('jump');
  void car.offsetWidth; // reflow
  car.classList.add('jump');
  setTimeout(()=>car.classList.remove('jump'),400);
}

function showGiftBubble(i,giftName,pts,repeat){
  const car=document.getElementById('tc'+i);
  const trk=document.getElementById('tr'+i);
  if(!car||!trk)return;

  const icon=getGiftIcon(giftName);
  const bubble=document.createElement('div');
  bubble.className='gift-bubble';
  bubble.innerHTML=`<span class="bubble-icon">${icon}</span><span class="bubble-text">${repeat>1?'x'+repeat:''}</span><span class="bubble-pts">+${pts}</span>`;

  // Position bubble above car
  const carLeft=parseInt(car.style.left)||2;
  bubble.style.left=(carLeft+10)+'px';

  trk.appendChild(bubble);
  setTimeout(()=>bubble.remove(),1000);
}

function updateTrack(i){
  const tw=document.getElementById('tr'+i).offsetWidth-26;
  const pos=Math.min((sc[i]/MAX)*tw,tw-2);
  document.getElementById('tc'+i).style.left=pos+'px';
  document.getElementById('tl'+i).style.width=pos+'px';
  document.getElementById('pv'+i).textContent=sc[i];

  // Rankings
  const sorted=[...sc].map((s,x)=>({s,x})).sort((a,b)=>b.s-a.s);
  sorted.forEach((it,r)=>{
    const el=document.getElementById('rn'+it.x);
    el.textContent=r+1;
    el.className='rnum '+(r===0?'r1':r===1?'r2':r===2?'r3':'');
  });
  const mx=Math.max(...sc);
  C.forEach((_,x)=>document.getElementById('wc'+x).className='wchip'+(sc[x]===mx&&mx>0?' lead':''));
}

function addFeed(d){
  const f=document.getElementById('feed');
  const ph=f.querySelector('div[style]');if(ph)ph.remove();
  const c=C[d.country];
  const icon=getGiftIcon(d.giftName);
  const el=document.createElement('div');
  el.className='fitem';
  el.innerHTML=`
    <span class="ffl">${c.flag}</span>
    <span class="fgift-icon">${icon}</span>
    <div class="finfo">
      <div class="fv">${esc(d.viewer)}</div>
      <div class="fg">${esc(d.giftName)}${d.repeat>1?' x'+d.repeat:''} → ${c.name}</div>
    </div>
    <div class="fpts">+${d.points}</div>`;
  f.prepend(el);
  while(f.children.length>20)f.removeChild(f.lastChild);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function finish(w){
  if(over)return;over=true;
  ws[w]++;document.getElementById('wn'+w).textContent=ws[w]+'W';
  const c=C[w];
  document.getElementById('wfl').textContent=c.flag;
  document.getElementById('wnm').textContent=c.name+' WINS! 🏆';
  document.getElementById('wsb').textContent='Total Wins: '+ws[w];
  document.getElementById('wov').classList.add('show');
  const mx=Math.max(...ws);
  C.forEach((_,i)=>document.getElementById('wc'+i).className='wchip'+(ws[i]===mx&&mx>0?' lead':''));
  for(let i=0;i<50;i++)setTimeout(confetti,i*38);
}

function confetti(){
  const el=document.createElement('div');el.className='cp';
  const cols=['#ffd700','#ff2d55','#2ecc40','#7fdbff','#ff851b','#b10dc9'];
  el.style.cssText='background:'+cols[Math.floor(Math.random()*cols.length)]+';left:'+Math.random()*100+'vw;top:-10px;animation-duration:'+(1+Math.random()*1.4)+'s';
  document.body.appendChild(el);setTimeout(()=>el.remove(),2800);
}

function nextRace(){document.getElementById('wov').classList.remove('show');resetRace(true);}
function resetRace(kw=false){
  sc=Array(10).fill(0);if(!kw)ws=Array(10).fill(0);
  document.getElementById('feed').innerHTML='<div style="text-align:center;color:rgba(255,255,255,.18);font-size:11px;padding:18px 0">Waiting for gifts...</div>';
  buildUI();
}
document.getElementById('uinp').addEventListener('keydown',e=>{if(e.key==='Enter')doConnect();});
</script>
</body>
</html>
